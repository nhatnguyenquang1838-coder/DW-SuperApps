apiVersion: ai-workspace/v1
kind: Workspace
metadata:
  id: dw-superapps
  name: DW SuperApps
hosts:
  - kiro
  - codex
  - copilot
  - cline
  - kilo
  - claude
  - custom
providers:
  - id: ollama
    type: openai-compatible
    base_url: http://localhost:11434/v1
    api_key: ollama
    model_env: OLLAMA_MODEL
    default_model: qwen3-coder:30b
powers:
  - id: gwc
    path: powers/gwc
    source: nhatnguyenquang1838-coder/gwc
    enabled: true
  - id: ua
    path: powers/ua
    source: Egonex-AI/Understand-Anything
    enabled: true
  - id: task-me
    path: powers/task-me
    source: nhatnguyenquang1838-coder/task-me
    enabled: true
systems:
  - id: rental-home
    path: systems/rental-home
    source: nhatnguyenquang1838-coder/rental_home
    enabled_powers:
      - gwc
      - ua
      - task-me
      - bmad
data_ownership:
  policy: system-owned
  roots:
    ua: .ua
    task_me: .task-me
    gwc: .gwc
    bmad: .bmad
