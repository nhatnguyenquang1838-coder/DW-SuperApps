name: Validate workspace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.DW_SUBMODULE_TOKEN }}

      - name: Diagnose checkout
        if: failure()
        run: |
          echo "Submodule status:"
          git submodule status || true
          echo "Gitmodules:"
          cat .gitmodules || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test one-click CLI installer
        shell: bash
        run: |
          bash -n bin/dw scripts/install-dw.sh
          test_home="$(mktemp -d)"
          HOME="$test_home" SHELL=/bin/bash ./bin/dw install --shell bash
          HOME="$test_home" "$test_home/.local/bin/dw" --version
          grep -Fq "DW SuperApps CLI" "$test_home/.bashrc"
          HOME="$test_home" SHELL=/bin/bash "$test_home/.local/bin/dw" uninstall --shell bash
          test ! -e "$test_home/.local/bin/dw"
          ! grep -Fq "DW SuperApps CLI" "$test_home/.bashrc"

      - run: python -m pip install -r requirements-dev.txt

      - name: Validate workspace contract
        run: python scripts/dw_cli.py validate

      - name: Test Power Runtime v2
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate host adapters
        run: |
          python scripts/dw_cli.py host install all
          python scripts/dw_cli.py host status all

      - name: Report submodule status
        run: python scripts/dw_cli.py power status all
