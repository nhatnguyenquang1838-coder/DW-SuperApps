name: Validate workspace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DW_TEST_HOME: ${{ runner.temp }}/dw-cli-home
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.DW_SUBMODULE_TOKEN }}

      - name: Diagnose checkout
        if: failure()
        run: |
          echo "Submodule status:"
          git submodule status || true
          echo "Gitmodules:"
          cat .gitmodules || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Bash entrypoints
        shell: bash
        run: bash -n bin/dw scripts/install-dw.sh scripts/python-resolver.sh

      - name: Install global DW CLI in temporary home
        shell: bash
        run: |
          rm -rf "$DW_TEST_HOME"
          mkdir -p "$DW_TEST_HOME"
          HOME="$DW_TEST_HOME" SHELL=/bin/bash ./bin/dw install --shell bash

      - name: Verify global DW CLI
        shell: bash
        run: |
          HOME="$DW_TEST_HOME" "$DW_TEST_HOME/.local/bin/dw" --version
          grep -Fq "DW SuperApps CLI" "$DW_TEST_HOME/.bashrc"

      - name: Uninstall global DW CLI
        shell: bash
        run: |
          HOME="$DW_TEST_HOME" SHELL=/bin/bash "$DW_TEST_HOME/.local/bin/dw" uninstall --shell bash
          test ! -e "$DW_TEST_HOME/.local/bin/dw"
          ! grep -Fq "DW SuperApps CLI" "$DW_TEST_HOME/.bashrc"

      - run: python -m pip install -r requirements-dev.txt

      - name: Validate workspace contract
        run: python scripts/dw_cli.py validate

      - name: Test Power Runtime
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate all host adapters
        run: |
          python scripts/dw_cli.py host list
          python scripts/dw_cli.py host install all
          python scripts/dw_cli.py host status all

      - name: Validate Ollama provider profile
        run: |
          python scripts/dw_cli.py provider install all
          python scripts/dw_cli.py provider status all

      - name: Report submodule status
        run: python scripts/dw_cli.py power status all
