name: Validate workspace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.DW_SUBMODULE_TOKEN }}

      - name: Diagnose checkout
        if: failure()
        run: |
          echo "Submodule status:"
          git submodule status || true
          echo "Gitmodules:"
          cat .gitmodules || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Bash entrypoints
        shell: bash
        run: bash -n bin/dw scripts/install-dw.sh scripts/python-resolver.sh

      - name: Install global DW CLI in temporary home
        shell: bash
        run: |
          rm -rf /tmp/dw-cli-home
          mkdir -p /tmp/dw-cli-home
          HOME=/tmp/dw-cli-home SHELL=/bin/bash bash bin/dw install --shell bash

      - name: Verify global DW CLI
        shell: bash
        run: |
          HOME=/tmp/dw-cli-home /tmp/dw-cli-home/.local/bin/dw --version
          grep -Fq "DW SuperApps CLI" /tmp/dw-cli-home/.bashrc

      - name: Uninstall global DW CLI
        shell: bash
        run: |
          HOME=/tmp/dw-cli-home SHELL=/bin/bash /tmp/dw-cli-home/.local/bin/dw uninstall --shell bash
          test ! -e /tmp/dw-cli-home/.local/bin/dw
          ! grep -Fq "DW SuperApps CLI" /tmp/dw-cli-home/.bashrc

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate workspace contract
        run: python scripts/dw_cli.py validate

      - name: Test one-click commands
        run: python -m unittest -v tests.test_oneclick_commands

      - name: Test multi-host runtime
        run: python -m unittest -v tests.test_multi_host_runtime

      - name: Test Power Runtime v2
        run: python -m unittest -v tests.test_power_runtime_v2

      - name: Test distribution contract
        run: python -m unittest -v tests.test_power_distribution_contract

      - name: Test deterministic builder
        run: python -m unittest -v tests.test_power_dist_builder

      - name: Test distribution integration
        run: python -m unittest -v tests.test_power_distribution_integration

      - name: Test portable runtime installer
        run: python -m unittest -v tests.test_power_runtime_installer

      - name: Test package consumer
        run: python -m unittest -v tests.test_power_package_consumer

      - name: Test BMAD source lock and graph
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_source_lock_and_graph_use_same_commit

      - name: Test BMAD graph closure
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_knowledge_graph_references_are_closed

      - name: Test BMAD distribution recipe
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_distribution_recipe_is_valid_and_skills_only

      - name: Test BMAD Power manifest
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_power_manifest_validates

      - name: Test BMAD host mapping
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_bootstrap_host_mapping

      - name: Test BMAD deterministic package
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_external_source_overlay_builds_a_deterministic_package

      - name: Test BMAD workflow modes
        run: python -m unittest -v tests.test_bmad_power_plugin.BmadPowerPluginTests.test_workflow_has_manual_and_scheduled_modes

      - name: Validate all host adapters
        run: |
          python scripts/dw_cli.py host list
          python scripts/dw_cli.py host install all
          python scripts/dw_cli.py host status all

      - name: Validate Ollama provider profile
        run: |
          python scripts/dw_cli.py provider install all
          python scripts/dw_cli.py provider status all

      - name: Report submodule status
        run: python scripts/dw_cli.py power status all
