name: Validate workspace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.DW_SUBMODULE_TOKEN }}

      - name: Diagnose checkout
        if: failure()
        run: |
          echo "Submodule status:"
          git submodule status || true
          echo "Gitmodules:"
          cat .gitmodules || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Bash entrypoints
        shell: bash
        run: bash -n bin/dw scripts/install-dw.sh scripts/python-resolver.sh

      - name: Install global DW CLI in temporary home
        id: install_dw
        continue-on-error: true
        shell: bash
        run: |
          rm -rf /tmp/dw-cli-home
          mkdir -p /tmp/dw-cli-home
          set +e
          HOME=/tmp/dw-cli-home SHELL=/bin/bash ./bin/dw install --shell bash > /tmp/dw-install.log 2>&1
          rc=$?
          echo "$rc" > /tmp/dw-install.rc
          cat /tmp/dw-install.log
          exit "$rc"

      - name: Upload installer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dw-installer-diagnostics
          path: |
            /tmp/dw-install.log
            /tmp/dw-install.rc
          if-no-files-found: warn

      - name: Require installer success
        if: always()
        shell: bash
        run: test "$(cat /tmp/dw-install.rc)" = "0"

      - name: Verify global DW CLI
        shell: bash
        run: |
          HOME=/tmp/dw-cli-home /tmp/dw-cli-home/.local/bin/dw --version
          grep -Fq "DW SuperApps CLI" /tmp/dw-cli-home/.bashrc

      - name: Uninstall global DW CLI
        shell: bash
        run: |
          HOME=/tmp/dw-cli-home SHELL=/bin/bash /tmp/dw-cli-home/.local/bin/dw uninstall --shell bash
          test ! -e /tmp/dw-cli-home/.local/bin/dw
          ! grep -Fq "DW SuperApps CLI" /tmp/dw-cli-home/.bashrc

      - run: python -m pip install -r requirements-dev.txt

      - name: Validate workspace contract
        run: python scripts/dw_cli.py validate

      - name: Test Power Runtime
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate all host adapters
        run: |
          python scripts/dw_cli.py host list
          python scripts/dw_cli.py host install all
          python scripts/dw_cli.py host status all

      - name: Validate Ollama provider profile
        run: |
          python scripts/dw_cli.py provider install all
          python scripts/dw_cli.py provider status all

      - name: Report submodule status
        run: python scripts/dw_cli.py power status all
