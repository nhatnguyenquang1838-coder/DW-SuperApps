name: Validate SCRUM-134 DW Super setup

on:
  push:
    branches:
      - feat/dw-power-distribution-v1
    paths:
      - .github/workflows/tmp-validate-scrum-134-setup.yml

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/dw-power-distribution-v1
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install DW launcher without shell mutation
        run: |
          set -o pipefail
          bash bin/dw install --shell none 2>&1 | tee setup-install.log
          "$HOME/.local/bin/dw" --version 2>&1 | tee setup-version.log

      - name: Initialize reviewed Power submodules
        run: |
          set -o pipefail
          "$HOME/.local/bin/dw" power init powers 2>&1 | tee setup-power-init.log
          "$HOME/.local/bin/dw" power status powers 2>&1 | tee setup-power-status.log

      - name: Install and verify Kiro wrappers
        run: |
          set -o pipefail
          "$HOME/.local/bin/dw" host install kiro --mode wrapper 2>&1 | tee setup-kiro-init.log
          "$HOME/.local/bin/dw" host status kiro 2>&1 | tee setup-kiro-status.log

      - name: Install and verify Codex wrappers
        run: |
          set -o pipefail
          "$HOME/.local/bin/dw" host install codex --mode wrapper 2>&1 | tee setup-codex-init.log
          "$HOME/.local/bin/dw" host status codex 2>&1 | tee setup-codex-status.log

      - name: Validate workspace and generate prompts
        run: |
          set -o pipefail
          "$HOME/.local/bin/dw" validate 2>&1 | tee setup-validate.log
          "$HOME/.local/bin/dw" power prompt gwc --system rental-home --task "Recover the governed task state" 2>&1 | tee setup-prompt-gwc.log
          "$HOME/.local/bin/dw" power prompt ua --system rental-home --task "Refresh the architecture knowledge graph" 2>&1 | tee setup-prompt-ua.log
          "$HOME/.local/bin/dw" power prompt task-me --system rental-home --task "Create an impact-aware implementation plan" 2>&1 | tee setup-prompt-task-me.log

      - name: Build setup evidence
        env:
          VALIDATED_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p manifests/evidence/SCRUM-134
          sha256sum setup-*.log > manifests/evidence/SCRUM-134/SHA256SUMS.txt
          python - <<'PY'
          import hashlib, json, os
          from datetime import datetime, timezone
          from pathlib import Path

          logs = {}
          for path in sorted(Path('.').glob('setup-*.log')):
              logs[path.name] = {
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                  'sizeBytes': path.stat().st_size,
              }
          evidence = {
              'schemaVersion': '1.0',
              'task': 'SCRUM-134',
              'parent': 'SCRUM-94',
              'repository': 'nhatnguyenquang1838-coder/DW-SuperApps',
              'branch': 'feat/dw-power-distribution-v1',
              'validatedHead': os.environ['VALIDATED_HEAD'],
              'workflowRunId': int(os.environ['GITHUB_RUN_ID']),
              'workflowRunAttempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'classification': 'PASS',
              'validatedFlows': [
                  'launcher install with shell=none',
                  'reviewed Power submodule init and status',
                  'Kiro wrapper install and status',
                  'Codex wrapper install and status',
                  'workspace validation',
                  'GWC, UA and Task Me prompt generation',
              ],
              'vercel': {
                  'classification': 'OPTIONAL_DEPLOYMENT_CONFIGURATION',
                  'selectedStrategy': 'gate deploy jobs with vars.VERCEL_DEPLOY_ENABLED == true',
                  'requiredSecretsWhenEnabled': ['VERCEL_TOKEN', 'VERCEL_ORG_ID', 'VERCEL_PROJECT_ID'],
                  'credentialsModified': False,
                  'deploymentPerformed': False,
              },
              'logs': logs,
              'generatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          root = Path('manifests/evidence/SCRUM-134')
          (root / 'setup-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload setup evidence
        uses: actions/upload-artifact@v4
        with:
          name: scrum-134-setup-${{ github.run_id }}
          path: |
            setup-*.log
            manifests/evidence/SCRUM-134/setup-evidence.json
            manifests/evidence/SCRUM-134/SHA256SUMS.txt
          if-no-files-found: error

      - name: Persist evidence and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/evidence/SCRUM-134
          git rm .github/workflows/tmp-validate-scrum-134-setup.yml
          git commit -m "test(setup): record SCRUM-134 workspace verification"
          git push origin HEAD:feat/dw-power-distribution-v1
