name: Capture SCRUM-131 validation evidence

on:
  push:
    branches:
      - feat/dw-power-distribution-v1
    paths:
      - .github/workflows/tmp-capture-scrum-131-evidence.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/dw-power-distribution-v1
          fetch-depth: 0
          submodules: false

      - name: Initialize and verify Power gitlinks
        run: |
          set -euo pipefail
          git submodule sync -- powers/gwc powers/task-me powers/ua
          git submodule update --init powers/gwc powers/task-me powers/ua
          test "$(git -C powers/gwc rev-parse HEAD)" = "62689ce35e279751a3bf17b5255ac258dafbe7d7"
          test "$(git -C powers/task-me rev-parse HEAD)" = "ef0b890b1fb9140109c04cbb490b41d9aa94bfff"
          test "$(git -C powers/ua rev-parse HEAD)" = "6ae71878beb50226a1e4b7e2f52ac6468c86f74b"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Execute validation matrix
        run: |
          set -euo pipefail
          set -o pipefail
          bash bin/dw validate 2>&1 | tee validation-dw.log
          python -m unittest discover -s tests -p "test_power_distribution_contract.py" 2>&1 | tee validation-contract.log
          python -m unittest discover -s tests -p "test_power_distribution_integration.py" 2>&1 | tee validation-integration.log
          python -m unittest discover -s tests -p "test_power_dist_builder.py" 2>&1 | tee validation-builder.log
          python -m unittest discover -s tests -p "test_power_package_consumer.py" 2>&1 | tee validation-consumer.log
          python -m unittest discover -s tests -p "test_power_runtime_installer.py" 2>&1 | tee validation-runtime.log
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee validation-full-suite.log
          bash tests/test_python_resolver.sh 2>&1 | tee validation-python-resolver.log
          python -m compileall -q scripts 2>&1 | tee validation-compile.log

      - name: Build canonical evidence
        env:
          VALIDATED_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p manifests/evidence/SCRUM-131
          sha256sum validation-*.log > manifests/evidence/SCRUM-131/SHA256SUMS.txt
          python - <<'PY'
          import hashlib, json, os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('manifests/evidence/SCRUM-131')
          logs = {}
          for path in sorted(Path('.').glob('validation-*.log')):
              logs[path.name] = {
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                  'size_bytes': path.stat().st_size,
              }
          evidence = {
              'schemaVersion': '1.0',
              'task': 'SCRUM-131',
              'parent': 'SCRUM-94',
              'repository': 'nhatnguyenquang1838-coder/DW-SuperApps',
              'branch': 'feat/dw-power-distribution-v1',
              'workflowRunId': int(os.environ['GITHUB_RUN_ID']),
              'workflowRunAttempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'validatedHead': os.environ['VALIDATED_HEAD'],
              'providerPins': {
                  'gwc': '62689ce35e279751a3bf17b5255ac258dafbe7d7',
                  'task-me': 'ef0b890b1fb9140109c04cbb490b41d9aa94bfff',
                  'ua': '6ae71878beb50226a1e4b7e2f52ac6468c86f74b',
              },
              'classification': 'PASS',
              'commands': [
                  'bash bin/dw validate',
                  'power distribution contract tests',
                  'cross-Power integration tests',
                  'package builder tests',
                  'consumer lifecycle tests',
                  'runtime installer tests',
                  'complete Python unit suite',
                  'portable Python resolver test',
                  'Python script compilation',
              ],
              'logs': logs,
              'generatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'releasePublished': False,
              'powerDistPublished': False,
              'deploymentPerformed': False,
          }
          (root / 'validation-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrum-131-validation-${{ github.run_id }}
          path: |
            validation-*.log
            manifests/evidence/SCRUM-131/validation-evidence.json
            manifests/evidence/SCRUM-131/SHA256SUMS.txt
          if-no-files-found: error

      - name: Persist evidence and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/evidence/SCRUM-131
          git rm .github/workflows/tmp-capture-scrum-131-evidence.yml
          git commit -m "test(power-dist): record SCRUM-131 validation evidence"
          git push origin HEAD:feat/dw-power-distribution-v1
