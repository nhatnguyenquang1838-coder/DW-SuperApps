name: Temporary SCRUM-132 repository hygiene

on:
  push:
    branches:
      - feat/dw-power-distribution-v1
    paths:
      - .github/workflows/tmp-clean-scrum-132-hygiene.yml

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/dw-power-distribution-v1
          fetch-depth: 0

      - name: Remove generated task-plan tree
        run: |
          set -euo pipefail
          TARGET=.ua/generated/task-plans/DW-POWER-DIST-20260724
          git ls-files "$TARGET" > /tmp/removed-files.txt
          test -s /tmp/removed-files.txt
          git rm -r "$TARGET"

      - name: Verify tracked-path hygiene
        run: |
          set -euo pipefail
          ! git ls-files | grep -E '^\.ua/generated/task-plans/DW-POWER-DIST-20260724/'
          ! git ls-files | grep -E '^\.github/workflows/tmp-(pin|validate|capture)-'
          ! git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache|\.mypy_cache|\.ruff_cache|node_modules)(/|$)'
          ! git ls-files | grep -E '(^|/)\.env([^/]*$|/)'
          ! git ls-files | grep -E '(^|/)(secrets|credentials)(/|$)'

      - name: Build hygiene evidence
        env:
          CLEANUP_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p manifests/evidence/SCRUM-132
          python - <<'PY'
          import hashlib, json, os
          from datetime import datetime, timezone
          from pathlib import Path

          removed = Path('/tmp/removed-files.txt').read_text(encoding='utf-8').splitlines()
          evidence = {
              'schemaVersion': '1.0',
              'task': 'SCRUM-132',
              'parent': 'SCRUM-94',
              'repository': 'nhatnguyenquang1838-coder/DW-SuperApps',
              'branch': 'feat/dw-power-distribution-v1',
              'cleanupSourceHead': os.environ['CLEANUP_HEAD'],
              'workflowRunId': int(os.environ['GITHUB_RUN_ID']),
              'classification': 'PASS',
              'removedRoot': '.ua/generated/task-plans/DW-POWER-DIST-20260724',
              'removedTrackedFileCount': len(removed),
              'removedListSha256': hashlib.sha256(('\n'.join(removed) + '\n').encode()).hexdigest(),
              'checks': {
                  'generatedTaskPlanAbsent': True,
                  'staleTemporaryWorkflowsAbsent': True,
                  'cacheDirectoriesAbsent': True,
                  'environmentFilesAbsent': True,
                  'secretCredentialDirectoriesAbsent': True,
              },
              'canonicalEvidencePreserved': [
                  'manifests/power-distribution-evidence.json',
                  'manifests/evidence/SCRUM-131/validation-evidence.json',
                  'manifests/evidence/SCRUM-131/SHA256SUMS.txt',
              ],
              'generatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          root = Path('manifests/evidence/SCRUM-132')
          (root / 'removed-files.txt').write_text('\n'.join(removed) + '\n', encoding='utf-8')
          (root / 'hygiene-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Commit cleanup and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/evidence/SCRUM-132
          git rm .github/workflows/tmp-clean-scrum-132-hygiene.yml
          git commit -m "chore(hygiene): remove generated DW Power task plans"
          git push origin HEAD:feat/dw-power-distribution-v1
