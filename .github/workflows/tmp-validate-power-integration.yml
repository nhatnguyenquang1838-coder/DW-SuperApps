name: Temporary DW Power integration validation

on:
  push:
    branches:
      - feat/dw-power-distribution-v1
    paths:
      - .github/workflows/tmp-validate-power-integration.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact integration branch
        uses: actions/checkout@v4
        with:
          ref: feat/dw-power-distribution-v1
          fetch-depth: 0
          submodules: false

      - name: Initialize reviewed Power submodules
        run: |
          set -euo pipefail
          git submodule sync -- powers/gwc powers/task-me powers/ua
          git submodule update --init powers/gwc powers/task-me powers/ua
          test "$(git -C powers/gwc rev-parse HEAD)" = "62689ce35e279751a3bf17b5255ac258dafbe7d7"
          test "$(git -C powers/task-me rev-parse HEAD)" = "ef0b890b1fb9140109c04cbb490b41d9aa94bfff"
          test "$(git -C powers/ua rev-parse HEAD)" = "6ae71878beb50226a1e4b7e2f52ac6468c86f74b"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate workspace and manifests
        run: |
          set -o pipefail
          bash bin/dw validate 2>&1 | tee validation-dw.log

      - name: Run cross-Power contract tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_power_distribution_contract.py" 2>&1 | tee validation-contract.log
          python -m unittest discover -s tests -p "test_power_distribution_integration.py" 2>&1 | tee validation-integration.log

      - name: Run package builder and consumer lifecycle tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_power_dist_builder.py" 2>&1 | tee validation-builder.log
          python -m unittest discover -s tests -p "test_power_package_consumer.py" 2>&1 | tee validation-consumer.log
          python -m unittest discover -s tests -p "test_power_runtime_installer.py" 2>&1 | tee validation-runtime.log

      - name: Run complete repository test suite
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee validation-full-suite.log

      - name: Validate portable Python resolver and compile tools
        run: |
          set -o pipefail
          bash tests/test_python_resolver.sh 2>&1 | tee validation-python-resolver.log
          python -m compileall -q scripts 2>&1 | tee validation-compile.log

      - name: Record validation metadata
        run: |
          set -euo pipefail
          {
            echo "branch=feat/dw-power-distribution-v1"
            echo "validated_head=$(git rev-parse HEAD)"
            echo "gwc=$(git -C powers/gwc rev-parse HEAD)"
            echo "task_me=$(git -C powers/task-me rev-parse HEAD)"
            echo "ua=$(git -C powers/ua rev-parse HEAD)"
            echo "validated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > validation-metadata.txt
          sha256sum validation-*.log validation-metadata.txt > validation-SHA256SUMS.txt

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrum-131-power-integration-validation-${{ github.run_id }}
          path: |
            validation-*.log
            validation-metadata.txt
            validation-SHA256SUMS.txt
          if-no-files-found: warn

      - name: Remove temporary workflow after success
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/tmp-validate-power-integration.yml
          git commit -m "chore(ci): remove temporary integration validation workflow"
          git push origin HEAD:feat/dw-power-distribution-v1
