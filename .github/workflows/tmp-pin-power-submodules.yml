name: Temporary exact Power submodule pin

on:
  push:
    branches:
      - feat/dw-power-distribution-v1
    paths:
      - .github/workflows/tmp-pin-power-submodules.yml

permissions:
  contents: write

jobs:
  pin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: feat/dw-power-distribution-v1
          fetch-depth: 0
          submodules: false

      - name: Initialize registered Power submodules
        run: |
          set -euo pipefail
          git submodule sync -- powers/gwc powers/task-me powers/ua
          git submodule update --init --depth 1 powers/gwc powers/task-me powers/ua

      - name: Pin exact reviewed commits
        run: |
          set -euo pipefail
          git -C powers/gwc fetch --depth 1 origin 62689ce35e279751a3bf17b5255ac258dafbe7d7
          git -C powers/gwc checkout --detach 62689ce35e279751a3bf17b5255ac258dafbe7d7

          git -C powers/task-me fetch --depth 1 origin ef0b890b1fb9140109c04cbb490b41d9aa94bfff
          git -C powers/task-me checkout --detach ef0b890b1fb9140109c04cbb490b41d9aa94bfff

          git -C powers/ua fetch --depth 1 origin 6ae71878beb50226a1e4b7e2f52ac6468c86f74b
          git -C powers/ua checkout --detach 6ae71878beb50226a1e4b7e2f52ac6468c86f74b

          test "$(git -C powers/gwc rev-parse HEAD)" = "62689ce35e279751a3bf17b5255ac258dafbe7d7"
          test "$(git -C powers/task-me rev-parse HEAD)" = "ef0b890b1fb9140109c04cbb490b41d9aa94bfff"
          test "$(git -C powers/ua rev-parse HEAD)" = "6ae71878beb50226a1e4b7e2f52ac6468c86f74b"

      - name: Commit exact gitlinks and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add powers/gwc powers/task-me powers/ua
          git rm .github/workflows/tmp-pin-power-submodules.yml
          git commit -m "chore(power-dist): pin reviewed Power submodules"
          git push origin HEAD:feat/dw-power-distribution-v1
