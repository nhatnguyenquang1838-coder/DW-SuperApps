apiVersion: dw.superapps/v2
kind: Power
metadata:
  id: ua
  name: Understand Anything
  version: main-pinned
  description: Semantic codebase analysis, architecture discovery, dependency mapping, and project knowledge generation.
spec:
  category: knowledge
  path: powers/ua
  source: Egonex-AI/Understand-Anything
  provides:
    - semantic-analysis
    - codebase-graph
    - architecture-graph
    - dependency-map
  consumes:
    - source-code
    - project-documents
    - repository-metadata
  requires:
    - filesystem
  optionalIntegrations:
    - github
    - task-me
  runtimeDataRoot: .ua
  hosts:
    - kiro
    - codex
    - copilot
    - cline
    - kilo
    - claude
    - custom
    - cli
  entrypoints:
    skillCandidates:
      - understand-anything-plugin/skills/understand/SKILL.md
      - README.md
    cliCandidates:
      - install.sh
      - install.ps1
  permissions:
    read:
      - "**"
    write:
      - ".ua/**"
    deny:
      - ".env*"
      - "**/secrets/**"
  distribution:
    contract: dw.power-distribution/v1
    defaultMode: submodule
    modes:
      submodule:
        repository: Egonex-AI/Understand-Anything
        path: powers/ua
        ref: main
      release:
        repository: nhatnguyenquang1838-coder/ua-power
        assetPattern: "ua-{version}.zip"
        checksumAssetPattern: "ua-{version}.zip.sha256"
      powerDist:
        repository: nhatnguyenquang1838-coder/ua-power
        ref: power-dist
    providerState:
      status: blocked-missing-repository
      task: DW-PDIST-04
      sourceCommit: null
      sourceLock: null
      note: Controlled ua-power fork or wrapper repository must be created before provider implementation.
