apiVersion: dw.superapps/v2
kind: Power
metadata:
  id: gwc
  name: GWC
  version: main-pinned
  description: Governance, delivery control, approval boundaries, validation, and repository lifecycle workflows.
spec:
  category: governance
  path: powers/gwc
  source: nhatnguyenquang1838-coder/gwc
  provides:
    - governance
    - delivery-control
    - approval-workflow
    - validation-orchestration
  consumes:
    - project-context
    - change-scope
    - repository-state
    - validation-evidence
  requires:
    - git
  optionalIntegrations:
    - github
    - jira
  runtimeDataRoot: .gwc
  hosts:
    - kiro
    - codex
    - copilot
    - cline
    - kilo
    - claude
    - custom
    - cli
  entrypoints:
    skillCandidates:
      - skills/gwc-g1/SKILL.md
      - AGENTS.md
      - agents/chatgpt-agent/agent-instructions.md
    cliCandidates:
      - tools/validate_instructions.py
      - tools/validate_g01.py
  permissions:
    read:
      - "**"
    write:
      - ".gwc/**"
    deny:
      - ".env*"
      - "**/secrets/**"
  distribution:
    contract: dw.power-distribution/v1
    defaultMode: submodule
    modes:
      submodule:
        repository: nhatnguyenquang1838-coder/gwc
        path: powers/gwc
        ref: main
      release:
        repository: nhatnguyenquang1838-coder/gwc
        assetPattern: "gwc-{version}.zip"
        checksumAssetPattern: "gwc-{version}.zip.sha256"
      powerDist:
        repository: nhatnguyenquang1838-coder/gwc
        ref: power-dist
    providerState:
      status: blocked-policy
      task: DW-PDIST-02
      sourceCommit: null
      sourceLock: null
      note: Provider write requires formal GWC gate authority; no bypass is permitted.
