apiVersion: dw.superapps/v2
kind: Power
metadata:
  id: gwc
  name: GWC
  version: main-pinned
  description: Governance, delivery control, approval boundaries, validation, and repository lifecycle workflows.
spec:
  category: governance
  path: powers/gwc
  source: nhatnguyenquang1838-coder/gwc
  provides:
    - governance
    - delivery-control
    - approval-workflow
    - validation-orchestration
  consumes:
    - project-context
    - change-scope
    - repository-state
    - validation-evidence
  requires:
    - git
  optionalIntegrations:
    - github
    - jira
  runtimeDataRoot: .gwc
  hosts:
    - kiro
    - codex
    - copilot
    - cline
    - kilo
    - claude
    - custom
    - cli
  entrypoints:
    skillCandidates:
      - skills/gwc-g1/SKILL.md
      - AGENTS.md
      - agents/chatgpt-agent/agent-instructions.md
    cliCandidates:
      - tools/validate_instructions.py
      - tools/validate_g01.py
  permissions:
    read:
      - "**"
    write:
      - ".gwc/**"
    deny:
      - ".env*"
      - "**/secrets/**"
