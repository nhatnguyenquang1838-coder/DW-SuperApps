apiVersion: dw.superapps/v2
kind: Power
metadata:
  id: task-me
  name: Task Me
  version: main-pinned
  description: Impact analysis, implementation planning, task decomposition, coding guidance, and validation planning.
spec:
  category: implementation-planning
  path: powers/task-me
  source: nhatnguyenquang1838-coder/task-me
  provides:
    - impact-analysis
    - implementation-planning
    - task-decomposition
    - validation-planning
  consumes:
    - requirements
    - design
    - architecture
    - codebase-graph
    - project-context
  requires:
    - filesystem
  optionalIntegrations:
    - ua
    - gwc
    - github
  runtimeDataRoot: .task-me
  hosts:
    - kiro
    - codex
    - copilot
    - cline
    - kilo
    - claude
    - custom
    - cli
  entrypoints:
    skillCandidates:
      - .kiro/skills/implementation-task-architect/SKILL.md
      - docs/runbooks/TASK-ARCHITECT-RUNBOOK.md
      - README.md
    cliCandidates:
      - scripts/validate.sh
  permissions:
    read:
      - "**"
    write:
      - ".task-me/**"
    deny:
      - ".env*"
      - "**/secrets/**"
  distribution:
    contract: dw.power-distribution/v1
    defaultMode: submodule
    modes:
      submodule:
        repository: nhatnguyenquang1838-coder/task-me
        path: powers/task-me
        ref: main
      release:
        repository: nhatnguyenquang1838-coder/task-me
        assetPattern: "task-me-{version}.zip"
        checksumAssetPattern: "task-me-{version}.zip.sha256"
      powerDist:
        repository: nhatnguyenquang1838-coder/task-me
        ref: power-dist
    providerState:
      status: ready-unpublished
      task: DW-PDIST-03
      sourceCommit: ef0b890b1fb9140109c04cbb490b41d9aa94bfff
      sourceLock: distribution/power-package.yaml
      note: Provider implementation is merged on main; release and power-dist remain unpublished.
