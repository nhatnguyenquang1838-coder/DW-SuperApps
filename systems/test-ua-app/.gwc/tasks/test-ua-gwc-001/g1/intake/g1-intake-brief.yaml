  - "GWC gate artifacts must live under systems/test-ua-app/.gwc/tasks/<task-id>/"
  - "No secrets or environment-file content in generated graph"
  - "Graph must exclude .git, node_modules, dist/build, coverage, test-results, playwright-report, .pnpm-store, caches, .env*, credentials, secrets"

assumptions:
