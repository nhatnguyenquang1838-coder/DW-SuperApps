    - Create systems/test-ua-app/AGENTS.md
    - Execute GWC lifecycle G0 through G5 for test-ua-app
    - Generate UA knowledge graph at systems/test-ua-app/.ua/knowledge-graph.json
    - Generate UA meta.json at systems/test-ua-app/.ua/meta.json
    - Launch UA dashboard to visualize the generated graph
    - Record GWC evidence and audit artifacts
  non_goals:
